<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KBO Live Now Mobile Preview</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(255, 107, 0, 0.22), transparent 260px),
          radial-gradient(circle at 80% 20%, rgba(11, 78, 162, 0.18), transparent 280px),
          linear-gradient(135deg, #eef3ff, #f8fafc 48%, #fff4e9);
        font-family: Arial, sans-serif;
      }

      .stage {
        width: min(100vw, 760px);
        height: 100vh;
        padding: 20px 24px;
        display: grid;
        place-items: center;
      }

      .phone {
        width: 360px;
        height: 780px;
        padding: 12px;
        border-radius: 42px;
        background:
          linear-gradient(145deg, #2b2f36, #0b0d10 42%, #343943);
        box-shadow:
          0 32px 80px rgba(17, 24, 39, 0.35),
          inset 0 0 0 2px rgba(255, 255, 255, 0.08);
        position: relative;
      }

      .phone::before {
        content: "";
        position: absolute;
        top: 12px;
        left: 50%;
        width: 112px;
        height: 24px;
        transform: translateX(-50%);
        border-radius: 0 0 18px 18px;
        background: #0b0d10;
        z-index: 2;
      }

      .screen {
        width: 100%;
        height: 100%;
        border: 0;
        border-radius: 31px;
        background: #f6f8fb;
        overflow: hidden;
      }

      .label {
        margin-top: 14px;
        color: #18202f;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div>
        <div class="phone">
          <iframe class="screen" src="http://127.0.0.1:3000" title="KBO Live Now"></iframe>
        </div>
        <div class="label">KBO LIVE NOW · MOBILE VIEW</div>
      </div>
    </main>
  </body>
</html>
